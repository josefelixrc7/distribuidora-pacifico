<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harina de Pescado Pacífico - Distribuidora El Pacífico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Navbar elegante -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    </nav>

    <div class="container my-5 margin-top-custom">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../index.html">Inicio</a></li>
                <li class="breadcrumb-item active">Harina de Pescado Pacífico</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-6">
                <h1 class="display-5 fw-bold mb-4">Harina de Pescado<span class="text-primary">Marca Pacífico</span></h1>
                <p class="lead">Harina de pescado industrial Pacífico.</p>
                <h4>Características:</h4>
                <ul>
                    <li>Venta por kilogramos</li>
                    <li>Uso industrial.</li>
                </ul>
            </div>
            <div class="col-md-6">
                <div id="productCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
                    <!-- Indicadores (puntos) -->
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#productCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    </div>
                    
                    <!-- Imágenes del carrusel -->
                    <div class="carousel-inner rounded-4 shadow">
                        <div class="carousel-item active">
                            <img src="../assets/images/harina-pacifico.png" class="d-block w-100" alt="Harina de Pescado Pacífico">
                        </div>
                    </div>
                    
                    <!-- Botones de navegación -->
                    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Siguiente</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Sección: ¿Hablamos? Call to Action -->
    <div class="section-contact"></div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2025 Distribuidora El Pacífico, C.A.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        loadNav('../');
        loadContactSection('../');
    </script>
</body>
</html>
